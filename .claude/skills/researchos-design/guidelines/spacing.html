<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--canvas); padding: 24px; font-family: var(--font-mono); }
  .row { display: flex; align-items: center; gap: 14px; margin-bottom: 9px; font-size: 11px; color: var(--text-muted); }
  .bar { height: 14px; background: var(--brand-periwinkle); border-radius: 2px; opacity: .85; }
  .tok { width: 70px; color: var(--text-secondary); }
  .px { width: 44px; color: var(--text-faint); text-align: right; }
</style>
</head>
<body>
  <div class="row"><span class="tok">space-1</span><span class="px">4px</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="tok">space-2</span><span class="px">8px</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="tok">space-3</span><span class="px">12px</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="tok">space-4</span><span class="px">16px</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="tok">space-6</span><span class="px">24px</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="tok">space-8</span><span class="px">32px</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="tok">space-12</span><span class="px">48px</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="tok">space-16</span><span class="px">64px</span><span class="bar" style="width:64px"></span></div>
</body>
</html>
