<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--canvas); padding: 24px; font-family: var(--font-sans); color: var(--text); }
  .spec { display: flex; flex-direction: column; gap: 18px; }
  .item { display: flex; align-items: baseline; gap: 18px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); width: 120px; flex-shrink: 0; text-transform: uppercase; letter-spacing: .1em; }
</style>
</head>
<body>
  <div class="spec">
    <div class="item"><span class="meta">Display · 36</span><span style="font-size:var(--text-display);line-height:1;letter-spacing:var(--text-display-ls);font-weight:600">Research<span class="ros-gradient-text">OS</span></span></div>
    <div class="item"><span class="meta">H1 · 24</span><span style="font-size:var(--text-h1);letter-spacing:var(--text-h1-ls);font-weight:600">Research Sessions</span></div>
    <div class="item"><span class="meta">H2 · 18</span><span style="font-size:var(--text-h2);letter-spacing:var(--text-h2-ls);font-weight:600">High-torque servo motor</span></div>
    <div class="item"><span class="meta">H3 · 16</span><span style="font-size:var(--text-h3);letter-spacing:var(--text-h3-ls);font-weight:600">Dynamixel XM430-W350-T</span></div>
  </div>
</body>
</html>
