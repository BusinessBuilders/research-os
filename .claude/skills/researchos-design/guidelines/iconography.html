<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; background: var(--canvas); padding: 24px; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 16px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--text-secondary); }
  .ic svg { width: 22px; height: 22px; stroke-width: 1.5; }
  .ic span { font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); }
  .note { margin-top: 18px; font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="grid" id="g"></div>
  <p class="note">Lucide (<code style="font-family:var(--font-mono);color:var(--text-secondary)">lucide-react</code>) — the app's icon set. 1.5px stroke, rounded caps. Status uses Search / Loader / Check / X / Circle.</p>
  <script>
    const names = ["search","sparkles","loader","circle-check","circle-x","circle","clock","target","package","bar-chart-3","scroll-text","wallet","external-link","rotate-cw","chevron-right","x"];
    document.getElementById("g").innerHTML = names.map(n =>
      `<div class="ic"><i data-lucide="${n}"></i><span>${n}</span></div>`).join("");
    lucide.createIcons();
  </script>
</body>
</html>
