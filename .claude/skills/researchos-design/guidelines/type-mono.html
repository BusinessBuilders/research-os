<!-- @dsCard group="Type" viewport="700x200" name="Mono / technical voice" subtitle="Uppercase eyebrows, labels, part numbers" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--canvas); padding: 24px; color: var(--text); }
  .spec { display: flex; flex-direction: column; gap: 18px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); width: 130px; flex-shrink: 0; text-transform: uppercase; letter-spacing: .1em; }
  .item { display: flex; align-items: baseline; gap: 18px; }
</style>
</head>
<body>
  <div class="spec">
    <div class="item"><span class="meta">Eyebrow · 11</span><span style="font-family:var(--font-mono);font-size:var(--mono-eyebrow);text-transform:uppercase;letter-spacing:var(--mono-eyebrow-ls);color:var(--text-muted)">AI Procurement Advisor</span></div>
    <div class="item"><span class="meta">Label · 12</span><span style="font-family:var(--font-mono);font-size:var(--mono-label);text-transform:uppercase;letter-spacing:var(--mono-label-ls);color:var(--brand-periwinkle)">Searching · Round 2</span></div>
    <div class="item"><span class="meta">Data · 13</span><span style="font-family:var(--font-mono);font-size:var(--mono-data);color:var(--text-secondary);font-variant-numeric:tabular-nums">P/N XM430-W350-T · $269.90</span></div>
  </div>
</body>
</html>
