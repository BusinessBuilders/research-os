<!-- @dsCard group="Colors" viewport="700x160" name="Semantic" subtitle="Fit, status & validation — fixed meanings" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--canvas); padding: 22px; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 48px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 11px; }
  .name { font-size: 12px; color: var(--text-secondary); }
  .use { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--success-soft);color:var(--success-text);box-shadow:inset 0 0 0 1px rgba(34,197,94,.3)">#22c55e</div><span class="name">success</span><span class="use">strong fit · complete</span></div>
    <div class="sw"><div class="chip" style="background:var(--warning-soft);color:var(--warning-text);box-shadow:inset 0 0 0 1px rgba(245,158,11,.3)">#f59e0b</div><span class="name">warning</span><span class="use">partial fit · evaluating</span></div>
    <div class="sw"><div class="chip" style="background:var(--danger-soft);color:var(--danger-text);box-shadow:inset 0 0 0 1px rgba(239,68,68,.3)">#ef4444</div><span class="name">danger</span><span class="use">poor fit · failed</span></div>
    <div class="sw"><div class="chip" style="background:var(--info-soft);color:var(--info-text);box-shadow:inset 0 0 0 1px rgba(59,130,246,.3)">#3b82f6</div><span class="name">info</span><span class="use">searching · charts</span></div>
  </div>
</body>
</html>
