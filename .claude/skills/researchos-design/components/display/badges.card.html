<!-- @dsCard group="Components" viewport="700x300" name="Badge · Card · Separator" subtitle="Surfaces & pills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../card-kit.js"></script>
<style>
  body { margin: 0; background: var(--canvas); padding: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Badge, Card, CardHeader, CardTitle, CardDescription, CardContent, Separator, StatusBadge } = window.ROSKit;
  function Demo() {
    return (
      <div className="grid">
        <div>
          <div className="row">
            <Badge variant="neutral">neutral</Badge>
            <Badge variant="success">success</Badge>
            <Badge variant="warning">warning</Badge>
            <Badge variant="danger">danger</Badge>
          </div>
          <div className="row">
            <Badge variant="info">info</Badge>
            <Badge variant="brand">brand</Badge>
            <Badge variant="outline">outline</Badge>
            <Badge variant="info" mono>searching</Badge>
          </div>
          <Separator />
          <div className="row" style={{ marginTop: 10 }}>
            <span className="ros-eyebrow">Horizontal & vertical rules</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12, height: 24 }}>
            <span style={{ color: "var(--text-muted)", fontSize: 13 }}>$129.00</span>
            <Separator orientation="vertical" />
            <span style={{ color: "var(--text-muted)", fontSize: 13 }}>McMaster-Carr</span>
            <Separator orientation="vertical" />
            <span style={{ color: "var(--text-muted)", fontSize: 13 }}>2 risks</span>
          </div>
        </div>
        <Card interactive>
          <CardHeader>
            <span className="ros-eyebrow">Session · goal-driven</span>
            <CardTitle>Upgrade robotics fab for tendon actuators</CardTitle>
            <CardDescription>Jun 6, 2026 · 4 needs identified · $4,200 budget</CardDescription>
          </CardHeader>
          <CardContent>
            <StatusBadge status="researching" />
          </CardContent>
        </Card>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
